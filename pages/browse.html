<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browse — CampusConnect</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div id="cc-navbar"></div>
  <div id="cc-toast" class="cc-toast"></div>

  <div class="page-titlebar">
    <div class="container d-flex justify-content-between align-items-center flex-wrap gap-3">
      <div>
        <h1>Browse Marketplace</h1>
        <p style="color:var(--text-muted);font-size:.9rem;margin:0" id="result-count">Loading listings…</p>
      </div>
      <div class="search-bar" style="max-width:340px;background:var(--bg)">
        <i class="bi bi-search" style="color:var(--text-muted)"></i>
        <input type="text" placeholder="Search listings…" id="searchInput" />
      </div>
    </div>
  </div>

  <div class="container pb-5">
    <div class="row g-4">
      <!-- SIDEBAR FILTERS -->
      <div class="col-lg-3 d-none d-lg-block">
        <div class="cc-sidebar">
          <div class="sidebar-title">Filter By</div>

          <div class="mb-3">
            <div class="cc-label">Category</div>
            <div id="cat-filters"></div>
          </div>

          <hr class="divider" />

          <div class="mb-3">
            <div class="cc-label">Price Range</div>
            <div class="d-flex gap-2">
              <input type="number" class="cc-input" placeholder="Min ₹" id="priceMin" style="font-size:.82rem" />
              <input type="number" class="cc-input" placeholder="Max ₹" id="priceMax" style="font-size:.82rem" />
            </div>
          </div>

          <hr class="divider" />

          <div class="mb-3">
            <div class="cc-label">Condition</div>
            <label class="filter-check"><input type="checkbox" class="cond-filter" value="Like New" checked /> Like New</label>
            <label class="filter-check"><input type="checkbox" class="cond-filter" value="Good" checked /> Good</label>
            <label class="filter-check"><input type="checkbox" class="cond-filter" value="Acceptable" checked /> Acceptable</label>
          </div>

          <hr class="divider" />

          <div class="mb-3">
            <div class="cc-label">Sort By</div>
            <select class="cc-select" id="sortBy">
              <option value="latest">Latest First</option>
              <option value="price-asc">Price: Low to High</option>
              <option value="price-desc">Price: High to Low</option>
              <option value="popular">Most Popular</option>
            </select>
          </div>

          <button class="btn-cc w-100 mt-2" onclick="applyFilters()">Apply Filters</button>
          <button class="btn-cc-outline w-100 mt-2" onclick="resetFilters()">Reset</button>
        </div>
      </div>

      <!-- MAIN GRID -->
      <div class="col-lg-9">
        <!-- Category Pills (mobile-friendly) -->
        <div class="d-flex gap-2 flex-wrap mb-4" id="cat-pills"></div>
        <!-- Results Grid -->
        <div class="row g-3" id="listings-grid"></div>
        <!-- Empty State -->
        <div id="empty-state" class="text-center py-5 d-none">
          <div style="font-size:3rem;margin-bottom:1rem">🔍</div>
          <div style="font-family:var(--font-head);font-size:1.2rem;font-weight:700;color:var(--secondary);margin-bottom:.5rem">No listings found</div>
          <p style="color:var(--text-muted)">Try different filters or search terms</p>
          <button class="btn-cc mt-2" onclick="resetFilters()">Clear Filters</button>
        </div>
      </div>
    </div>
  </div>

  <div id="cc-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/db.js"></script>
  <script src="../js/components.js"></script>
  <script>
    renderNavbar('browse');
    renderFooter();

    let activeCategory = 'all';
    const params = new URLSearchParams(window.location.search);
    if (params.get('cat')) activeCategory = params.get('cat');
    if (params.get('q')) document.getElementById('searchInput').value = params.get('q');

    // Category pills
    const pillsWrap = document.getElementById('cat-pills');
    CC_DB.categories.forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'cat-pill' + (c.id === activeCategory ? ' active' : '');
      btn.innerHTML = `${c.icon} ${c.label}`;
      btn.onclick = () => { activeCategory = c.id; document.querySelectorAll('.cat-pill').forEach(p=>p.classList.remove('active')); btn.classList.add('active'); renderListings(); };
      pillsWrap.appendChild(btn);
    });

    // Category sidebar checkboxes
    const catFilters = document.getElementById('cat-filters');
    CC_DB.categories.filter(c=>c.id!=='all').forEach(c => {
      catFilters.innerHTML += `<label class="filter-check"><input type="checkbox" class="cat-cb" value="${c.id}" checked /> ${c.icon} ${c.label}</label>`;
    });

    function getFilteredListings() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      const minP = parseFloat(document.getElementById('priceMin').value) || 0;
      const maxP = parseFloat(document.getElementById('priceMax').value) || Infinity;
      const conditions = [...document.querySelectorAll('.cond-filter:checked')].map(i=>i.value);
      const sort = document.getElementById('sortBy').value;

      let list = CC_DB.listings.filter(l => {
        if (activeCategory !== 'all' && l.category !== activeCategory) return false;
        if (q && !l.title.toLowerCase().includes(q) && !l.seller.toLowerCase().includes(q) && !l.desc.toLowerCase().includes(q)) return false;
        if (l.price < minP || l.price > maxP) return false;
        if (l.condition && !conditions.includes(l.condition) && conditions.length > 0) return false;
        return true;
      });

      if (sort === 'price-asc') list.sort((a,b)=>a.price-b.price);
      else if (sort === 'price-desc') list.sort((a,b)=>b.price-a.price);
      else if (sort === 'popular') list.sort((a,b)=>b.views-a.views);

      return list;
    }

    function renderListings() {
      const list = getFilteredListings();
      const grid = document.getElementById('listings-grid');
      const empty = document.getElementById('empty-state');
      document.getElementById('result-count').textContent = `${list.length} listing${list.length!==1?'s':''} found`;

      if (list.length === 0) { grid.innerHTML = ''; empty.classList.remove('d-none'); return; }
      empty.classList.add('d-none');
      grid.innerHTML = list.map(l => `<div class="col-6 col-md-4">${renderListingCard(l)}</div>`).join('');
    }

    function applyFilters() { renderListings(); }

    function resetFilters() {
      activeCategory = 'all';
      document.getElementById('searchInput').value = '';
      document.getElementById('priceMin').value = '';
      document.getElementById('priceMax').value = '';
      document.getElementById('sortBy').value = 'latest';
      document.querySelectorAll('.cond-filter').forEach(i=>i.checked=true);
      document.querySelectorAll('.cat-pill').forEach(p=>p.classList.remove('active'));
      pillsWrap.querySelectorAll('.cat-pill')[0].classList.add('active');
      renderListings();
    }

    document.getElementById('searchInput').addEventListener('input', renderListings);
    document.getElementById('sortBy').addEventListener('change', renderListings);

    renderListings();
  </script>
</body>
</html>
