<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tutoring — CampusConnect</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div id="cc-navbar"></div>
  <div id="cc-toast" class="cc-toast"></div>

  <!-- HERO -->
  <div style="position:relative;height:320px;overflow:hidden">
    <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?w=1400&q=80" alt="Students studying" style="width:100%;height:100%;object-fit:cover;filter:brightness(.45)" />
    <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:1rem">
      <div class="hero-tag" style="margin-bottom:1rem">🎓 Peer Learning Network</div>
      <h1 style="font-size:2.4rem;font-weight:800;color:white;margin-bottom:.7rem;letter-spacing:-.03em">Find Your Perfect Tutor</h1>
      <p style="color:rgba(255,255,255,.7);max-width:440px;margin:0 auto 1.6rem;font-size:.95rem">Learn from toppers and seniors in your campus community.</p>
      <div class="search-bar mx-auto" style="max-width:460px;width:100%">
        <i class="bi bi-search" style="color:#94a3b8"></i>
        <input type="text" placeholder="Search subject, topic, tutor name…" id="tutor-search" />
        <button class="btn-cc" onclick="filterTutors()">Find Tutor</button>
      </div>
    </div>
  </div>

  <div class="container py-5">
    <div class="d-flex gap-2 flex-wrap mb-4 justify-content-center" id="subject-pills">
      <button class="cat-pill active" onclick="filterSubject(this,'all')">All Subjects</button>
      <button class="cat-pill" onclick="filterSubject(this,'math')">Mathematics</button>
      <button class="cat-pill" onclick="filterSubject(this,'cs')">Computer Science</button>
      <button class="cat-pill" onclick="filterSubject(this,'physics')">Physics</button>
      <button class="cat-pill" onclick="filterSubject(this,'chemistry')">Chemistry</button>
      <button class="cat-pill" onclick="filterSubject(this,'english')">English</button>
    </div>
    <div class="row g-4" id="tutors-grid"></div>
  </div>

  <section class="py-5" style="background:var(--secondary)">
    <div class="container">
      <div class="row align-items-center g-5">
        <div class="col-lg-6">
          <div style="border-radius:16px;overflow:hidden;height:280px">
            <img src="https://images.unsplash.com/photo-1427504494785-3a9ca7044f45?w=700&q=80" alt="Teaching" style="width:100%;height:100%;object-fit:cover" />
          </div>
        </div>
        <div class="col-lg-6">
          <div class="section-label" style="color:#93c5fd">Earn While You Learn</div>
          <h2 style="font-size:1.75rem;font-weight:800;color:white;margin-bottom:.6rem;letter-spacing:-.025em">Become a Tutor</h2>
          <p style="color:rgba(255,255,255,.55);margin-bottom:1.5rem;font-size:.925rem">Share your knowledge, build your campus network, and earn ₹200–₹500 per session. No experience required — just expertise.</p>
          <a href="sell.html" class="btn-cc">Start Tutoring Today</a>
        </div>
      </div>
    </div>
  </section>

  <div id="cc-footer"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/db.js"></script>
  <script src="../js/components.js"></script>
  <script>
    renderNavbar('tutoring');
    renderFooter();

    const tutors = [
      { name:'Ananya V.', photo:'https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=400&q=80', college:'IIT Tirupati', subject:'Machine Learning & AI', subjects:['cs'], rate:300, rating:4.9, reviews:34, sessions:120, badge:'IIT Scholar', desc:'PhD researcher. Covers ML fundamentals, TensorFlow, Keras, and research paper walkthroughs.' },
      { name:'Sneha T.', photo:'https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=400&q=80', college:'VITU Vizag', subject:'Python Programming', subjects:['cs'], rate:200, rating:4.8, reviews:28, sessions:85, badge:'Top Rated', desc:'Full-stack developer. Beginner to advanced Python — web scraping, Flask, Django.' },
      { name:'Ravi K.', photo:'https://images.unsplash.com/photo-1560250097-0b93528c311a?w=400&q=80', college:'Andhra University', subject:'Engineering Mathematics', subjects:['math'], rate:400, rating:5.0, reviews:52, sessions:200, badge:'PhD', desc:'10+ years teaching. Calculus, Linear Algebra, Differential Equations, Probability.' },
      { name:'Meera P.', photo:'https://images.unsplash.com/photo-1580489944761-15a19d654956?w=400&q=80', college:'GITAM Vizag', subject:'Organic Chemistry', subjects:['chemistry'], rate:250, rating:4.7, reviews:19, sessions:62, badge:null, desc:'GATE qualified. Reaction mechanisms, named reactions, stereochemistry. Exam prep.' },
      { name:'Arjun S.', photo:'https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=400&q=80', college:'NIT Warangal', subject:'Data Structures & Algorithms', subjects:['cs'], rate:350, rating:4.9, reviews:41, sessions:150, badge:'NIT Topper', desc:'Campus placement champion. Arrays, trees, DP, graphs. LeetCode & FAANG prep.' },
      { name:'Pooja L.', photo:'https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?w=400&q=80', college:'VR Siddhartha', subject:'Engineering Physics', subjects:['physics'], rate:220, rating:4.6, reviews:15, sessions:48, badge:null, desc:'Gold medallist. Quantum mechanics, optics, electrodynamics, thermodynamics.' },
      { name:'Karthik M.', photo:'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=400&q=80', college:'JNTU Kakinada', subject:'Technical English', subjects:['english'], rate:180, rating:4.7, reviews:22, sessions:78, badge:null, desc:'IELTS 8.5. Report writing, presentation skills, interview prep, business writing.' },
      { name:'Divya R.', photo:'https://images.unsplash.com/photo-1531746020798-e6953c6e8e04?w=400&q=80', college:'Andhra University', subject:'Applied Mathematics', subjects:['math'], rate:280, rating:4.8, reviews:30, sessions:95, badge:'Gold Medal', desc:'University topper. Laplace/Fourier transforms, Z-transforms, numerical methods.' },
    ];

    let activeSubj = 'all', searchQ = '';

    function renderTutors() {
      const grid = document.getElementById('tutors-grid');
      const filtered = tutors.filter(t => {
        if (activeSubj !== 'all' && !t.subjects.includes(activeSubj)) return false;
        if (searchQ && !t.name.toLowerCase().includes(searchQ) && !t.subject.toLowerCase().includes(searchQ)) return false;
        return true;
      });
      grid.innerHTML = filtered.map(t => `
      <div class="col-md-6 col-lg-3">
        <div class="cc-card h-100">
          <div style="height:170px;overflow:hidden;background:#f1f5f9">
            <img src="${t.photo}" alt="${t.name}" style="width:100%;height:100%;object-fit:cover;object-position:top"
              onerror="this.parentElement.innerHTML='<div style=width:100%;height:100%;background:#e2e8f0;display:flex;align-items:center;justify-content:center;font-size:3rem>🎓</div>'" />
          </div>
          <div class="cc-card-body">
            <div class="d-flex align-items-start justify-content-between mb-1">
              <div>
                <div style="font-weight:700;font-size:.9rem;color:var(--secondary)">${t.name}</div>
                <div style="font-size:.75rem;color:var(--text-muted)">${t.college}</div>
              </div>
              ${t.badge ? `<span class="chip green" style="font-size:.65rem">${t.badge}</span>` : ''}
            </div>
            <div style="font-weight:600;font-size:.85rem;color:var(--primary);margin:0.4rem 0">${t.subject}</div>
            <div style="font-size:.8rem;color:var(--text-muted);margin-bottom:.6rem;line-height:1.5">${t.desc.substring(0,80)}…</div>
            <div style="font-size:.77rem;color:var(--text-muted);margin-bottom:.7rem">
              <span class="rating">★ ${t.rating}</span> (${t.reviews}) &nbsp;·&nbsp; ${t.sessions} sessions
            </div>
            <hr class="divider" style="margin:.65rem 0" />
            <div class="d-flex align-items-center justify-content-between">
              <div>
                <div style="font-size:.7rem;color:var(--text-muted)">Starting at</div>
                <div style="font-size:1.05rem;font-weight:800;color:var(--primary)">₹${t.rate}<span style="font-size:.73rem;color:var(--text-muted);font-weight:400">/session</span></div>
              </div>
              <button class="btn-cc" style="font-size:.78rem;padding:.38rem .85rem" onclick="addCart('l003');showToast('Session added to cart!','🎓')">Book</button>
            </div>
          </div>
        </div>
      </div>`).join('') || '<div class="col-12 text-center py-4"><p style="color:var(--text-muted)">No tutors found.</p></div>';
    }

    function filterSubject(btn, subj) {
      activeSubj = subj;
      document.querySelectorAll('#subject-pills .cat-pill').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      renderTutors();
    }

    function filterTutors() {
      searchQ = document.getElementById('tutor-search').value.toLowerCase();
      renderTutors();
    }
    document.getElementById('tutor-search').addEventListener('input', filterTutors);
    renderTutors();
  </script>
</body>
</html>
